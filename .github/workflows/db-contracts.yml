name: DB Contracts

on:
  pull_request:
    paths:
      - ".github/workflows/db-contracts.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "lib/db-marketing/**"
      - "apps/notes-android/**"
      - "apps/notes-next/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/db-contracts.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "lib/db-marketing/**"
      - "apps/notes-android/**"
      - "apps/notes-next/**"
  workflow_dispatch:

jobs:
  verify-marketing:
    name: Verify Marketing contract
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17-trixie
        env:
          POSTGRES_DB: app_contracts
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d app_contracts"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      MARKETING_DB_URL: postgres://postgres:postgres@localhost:5432/app_contracts
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install PostgreSQL 17 client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-common ca-certificates
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-17
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Show PostgreSQL versions
        run: |
          which psql
          which pg_dump
          pg_dump --version
          psql --version
          psql "$MARKETING_DB_URL" -Atqc "SELECT version()"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify @lib/db-marketing
        run: pnpm --filter @lib/db-marketing db:verify

  verify-marketing-clients:
    name: Verify Marketing clients
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test notes-next adapter parity
        run: pnpm --filter notes-next test

      - name: Type-check notes-next
        run: pnpm --filter notes-next check-types

      - name: Test notes-android adapter parity
        run: pnpm --filter notes-android test

      # Turbo forwards args after `--` to each package script (e.g. `next build`), not to
      # Turbo's own --filter. Use `turbo run build --filter=...` so only those packages build.
      - name: Build marketing clients (turbo-filtered)
        run: pnpm exec turbo run build --filter=notes-next --filter=notes-android

